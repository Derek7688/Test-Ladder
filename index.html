<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>셀프 사다리 (Self-Ladder)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation; /* 줌 방지 및 터치 최적화 */
        }
        .auto-active { background-color: #f97316 !important; color: white !important; border-color: #f97316 !important; }
        .pause-active { background-color: #ef4444 !important; color: white !important; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #e2e8f0; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: #2563eb; cursor: pointer; -webkit-appearance: none; margin-top: -8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* 레이아웃 고정용 추가 스타일 */
        .card-container {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-start p-4">

    <!-- [1] 설정 화면 -->
    <div id="setup-screen" class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full border border-slate-100 my-auto">
        <div class="mb-8 text-center">
            <span class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-sm font-bold mb-3 inline-block">Self-Ladder Tool</span>
            <h1 class="text-3xl font-black text-slate-800 mb-2">셀프 사다리</h1>
            <p id="setup-lesson-title" class="text-blue-600 font-bold text-lg italic">데이터 로딩 중...</p>
        </div>
        
        <div class="mb-10 px-2">
            <div class="flex justify-between items-center mb-4">
                <p class="text-slate-700 font-bold text-sm">누적 반복 단위</p>
                <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-xl" id="chunk-value">5</div>
            </div>
            <input type="range" id="chunk-slider" min="1" max="10" value="5" oninput="updateChunkDisplay(this.value)" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
        </div>

        <div class="mb-8">
            <button id="auto-mode-btn" onclick="toggleAutoMode()" class="w-full py-4 rounded-2xl border-2 border-slate-100 font-bold text-slate-600 flex items-center justify-center gap-2 transition-all hover:bg-slate-50">
                <span id="auto-icon">⚪</span> 자동 재생 모드 OFF
            </button>
        </div>
        
        <button onclick="startStudy()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">연습 시작하기</button>
    </div>

    <!-- [2] 학습 화면 -->
    <div id="study-screen" class="hidden w-full max-w-lg text-slate-900 mx-auto">
        <div class="flex justify-between items-center mb-6 px-2">
            <button onclick="location.reload()" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
            </button>
            <div id="active-lesson-name" class="text-slate-400 font-black text-sm tracking-widest uppercase">Lesson</div>
            <div class="w-10"></div>
        </div>

        <div class="flex justify-between items-end mb-4 px-2">
            <div>
                <span id="sentence-number" class="bg-slate-200 text-slate-600 px-3 py-1 rounded-lg text-xs font-bold mr-2 tracking-tighter">No.1</span>
                <span id="chunk-indicator" class="text-orange-600 font-black text-xl tracking-tight">구간 1</span>
            </div>
            <div id="mode-status" class="text-[10px] font-black px-3 py-1 rounded-full bg-slate-100 text-slate-400 uppercase">수동 모드</div>
        </div>

        <div class="bg-white p-10 rounded-[3rem] shadow-2xl card-container text-center mb-6 border border-slate-50 relative overflow-hidden">
            <div id="kr-box" class="text-2xl font-bold text-slate-800 leading-relaxed mb-8 break-keep"></div>
            <div id="en-box" class="invisible opacity-0 translate-y-4 transition-all duration-500 w-full text-center">
                <div class="h-[1px] bg-slate-100 w-16 mx-auto mb-8"></div>
                <p id="en-text" class="text-2xl font-black text-blue-600 leading-tight break-keep px-4"></p>
            </div>

            <!-- 학습 완료 화면 (학습 중에는 보이지 않게 z-index 및 레이아웃 수정) -->
            <div id="finish-ui" class="hidden absolute inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center rounded-[3rem]">
                <p class="text-4xl mb-4">🎉</p>
                <h2 class="text-2xl font-black mb-2">연습 완료!</h2>
                <p class="text-slate-500 text-sm mb-8 leading-relaxed">복습 알림을 예약할까요?<br>폰 캘린더에 바로 저장됩니다.</p>
                
                <div class="w-full flex flex-col gap-3">
                    <button id="cal-confirm-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">복습 알림 예약하기</button>
                    <button onclick="location.reload()" class="text-slate-400 text-sm font-bold py-2">그냥 종료하기</button>
                </div>
            </div>

            <div id="auto-controls" class="hidden absolute top-6 right-8 flex items-center gap-2">
                <button onclick="togglePause()" id="pause-btn" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-600">
                    <span id="pause-icon">⏸</span>
                </button>
                <div class="flex items-center gap-1">
                    <span id="playing-dot" class="w-2 h-2 bg-orange-500 rounded-full animate-ping"></span>
                    <span class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Auto</span>
                </div>
            </div>
        </div>

        <div id="control-panel" class="flex flex-col gap-3">
            <div class="flex gap-2">
                <button onclick="prevStep()" id="prev-btn" class="w-20 bg-white border-2 border-slate-100 text-slate-300 py-6 rounded-[2rem] font-black text-xl hover:bg-slate-50 transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <button onclick="handleAction()" id="main-btn" class="flex-1 bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl active:scale-95 transition-all">정답 확인</button>
            </div>
            <button onclick="switchModeInGame()" id="mode-switch-btn" class="w-full py-3 rounded-2xl border-2 border-slate-200 text-slate-400 font-bold text-xs hover:bg-slate-50 transition-all">
                자동 재생으로 전환하기
            </button>
        </div>
        
        <div class="mt-8 h-2 w-full bg-slate-200 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="text-center text-slate-400 text-[10px] font-bold mt-2 uppercase tracking-widest pb-8">Step 1 / 00</p>
    </div>

    <script>
        const SHEET_ID = "1CHjY3h5DyIshn18duKQotb6HtVdgsdKqiQA1mHi72y0";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        let rawData = [];
        let studySequence = [];
        let currentIdx = 0;
        let isRevealed = false;
        let selectedChunkSize = 5;
        let isAutoMode = false;
        let isPaused = false;
        let autoTimer = null;

        const params = new URLSearchParams(window.location.search);
        let currentLessonId = params.get('id') ? decodeURIComponent(params.get('id')).trim() : null;
        
        document.getElementById('setup-lesson-title').innerText = currentLessonId ? currentLessonId : "ID 오류";
        document.getElementById('active-lesson-name').innerText = currentLessonId ? currentLessonId : "";

        function updateChunkDisplay(val) {
            selectedChunkSize = parseInt(val);
            document.getElementById('chunk-value').innerText = val;
        }

        function toggleAutoMode() {
            isAutoMode = !isAutoMode;
            const btn = document.getElementById('auto-mode-btn');
            btn.innerHTML = isAutoMode ? `<span>🟠</span> 자동 재생 모드 ON` : `<span>⚪</span> 자동 재생 모드 OFF`;
            btn.className = `w-full py-4 rounded-2xl border-2 font-bold flex items-center justify-center gap-2 transition-all ${isAutoMode ? 'auto-active' : 'border-slate-100 text-slate-600'}`;
        }

        function switchModeInGame() {
            isAutoMode = !isAutoMode;
            isPaused = false;
            updateInGameModeUI();
            if(isAutoMode) startAutoTimer(5000);
            else clearTimeout(autoTimer);
        }

        function updateInGameModeUI() {
            const status = document.getElementById('mode-status');
            const switchBtn = document.getElementById('mode-switch-btn');
            const controls = document.getElementById('auto-controls');
            if(isAutoMode) {
                status.innerText = "자동 재생 중";
                status.className = "text-[10px] font-black px-3 py-1 rounded-full bg-orange-100 text-orange-600 uppercase";
                switchBtn.innerText = "수동 모드로 전환하기";
                controls.classList.remove('hidden');
                updatePauseUI();
            } else {
                status.innerText = "수동 모드";
                status.className = "text-[10px] font-black px-3 py-1 rounded-full bg-slate-100 text-slate-400 uppercase";
                switchBtn.innerText = "자동 재생으로 전환하기";
                controls.classList.add('hidden');
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            updatePauseUI();
            if(!isPaused) {
                if (!isRevealed) startAutoTimer(5000);
                else startAutoTimer(3000);
            } else {
                clearTimeout(autoTimer);
            }
        }

        function updatePauseUI() {
            const btn = document.getElementById('pause-btn');
            const icon = document.getElementById('pause-icon');
            if(isPaused) {
                btn.classList.add('pause-active');
                icon.innerText = "▶";
            } else {
                btn.classList.remove('pause-active');
                icon.innerText = "⏸";
            }
        }

        async function startStudy() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim()));
                rawData = rows.slice(1).filter(r => r[0] === currentLessonId).map(r => ({ num: r[1], kr: r[2], en: r[3] }));
                
                studySequence = [];
                for (let i = 0; i < rawData.length; i += selectedChunkSize) {
                    let end = Math.min(i + selectedChunkSize - 1, rawData.length - 1);
                    for (let j = i; j <= end; j++) {
                        for (let k = i; k <= j; k++) {
                            studySequence.push({ data: rawData[k], chunkNum: Math.floor(i/selectedChunkSize) + 1 });
                        }
                    }
                    if (end > i) {
                        for (let j = end; j >= i; j--) {
                            for (let k = end; k >= j; k--) {
                                studySequence.push({ data: rawData[k], chunkNum: Math.floor(i/selectedChunkSize) + 1 });
                            }
                        }
                    }
                }
                
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('study-screen').classList.remove('hidden');
                updateInGameModeUI();
                render();
            } catch (e) { alert("데이터 로드 실패"); }
        }

        function render() {
            clearTimeout(autoTimer);
            const item = studySequence[currentIdx];
            document.getElementById('sentence-number').innerText = `No.${item.data.num}`;
            document.getElementById('kr-box').innerText = item.data.kr;
            document.getElementById('en-text').innerText = item.data.en;
            document.getElementById('chunk-indicator').innerText = `구간 ${item.chunkNum}`;
            document.getElementById('progress-text').innerText = `Step ${currentIdx + 1} / ${studySequence.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx) / (studySequence.length - 1)) * 100}%`;
            document.getElementById('en-box').classList.add('invisible', 'opacity-0', 'translate-y-4');
            document.getElementById('main-btn').innerText = "정답 확인";
            isRevealed = false;

            const prevBtn = document.getElementById('prev-btn');
            if (currentIdx > 0) {
                prevBtn.classList.remove('text-slate-300');
                prevBtn.classList.add('text-slate-600');
            } else {
                prevBtn.classList.add('text-slate-300');
                prevBtn.classList.remove('text-slate-600');
            }

            if(isAutoMode && !isPaused) startAutoTimer(5000);
        }

        function prevStep() {
            if (currentIdx > 0) {
                if(isAutoMode) togglePause();
                currentIdx--;
                render();
            }
        }

        function startAutoTimer(ms) {
            clearTimeout(autoTimer);
            autoTimer = setTimeout(handleAction, ms);
        }

        function handleAction() {
            clearTimeout(autoTimer);
            if (!isRevealed) {
                document.getElementById('en-box').classList.remove('invisible', 'opacity-0', 'translate-y-4');
                document.getElementById('main-btn').innerText = "다음 단계";
                isRevealed = true;
                if(isAutoMode && !isPaused) startAutoTimer(3000);
            } else {
                currentIdx++;
                if (currentIdx < studySequence.length) render();
                else finishStudy();
            }
        }

        function finishStudy() {
            clearTimeout(autoTimer);
            document.getElementById('finish-ui').classList.remove('hidden');
            // 조작 패널 숨기거나 비활성화
            document.getElementById('control-panel').style.visibility = 'hidden';
            
            const btn = document.getElementById('cal-confirm-btn');
            
            btn.onclick = function() {
                const days = prompt("며칠 뒤에 복습 알림을 예약할까요? (1~30)", "1");
                if (!days) return;

                const gap = parseInt(days);
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + gap);
                
                const year = targetDate.getFullYear();
                const month = String(targetDate.getMonth() + 1).padStart(2, '0');
                const date = String(targetDate.getDate()).padStart(2, '0');
                const stamp = `${year}${month}${date}T090000`;

                const title = `[복습] ${currentLessonId}`;
                const details = `공부한 내용을 복습해보세요!\n사다리 주소: ${window.location.href}`;

                const icsData = [
                    "BEGIN:VCALENDAR",
                    "VERSION:2.0",
                    "BEGIN:VEVENT",
                    `DTSTART:${stamp}`,
                    `DTEND:${stamp}`,
                    `SUMMARY:${title}`,
                    `DESCRIPTION:${details}`,
                    "BEGIN:VALARM",
                    "TRIGGER:-PT0M",
                    "ACTION:DISPLAY",
                    "DESCRIPTION:Reminder",
                    "END:VALARM",
                    "END:VEVENT",
                    "END:VCALENDAR"
                ].join("\n");

                const blob = new Blob([icsData], { type: "text/calendar;charset=utf-8" });
                const link = document.createElement("a");
                link.href = window.URL.createObjectURL(blob);
                link.setAttribute("download", "review_reminder.ics");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // 다운로드 후 리로드
                setTimeout(() => location.reload(), 500);
            };
        }
    </script>
</body>
</html>
