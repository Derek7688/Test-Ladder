<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>셀프 사다리 (Self-Ladder)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .chunk-active { border-color: #2563eb; background-color: #eff6ff; color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- [1] 설정 화면 -->
    <div id="setup-screen" class="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full border border-slate-100">
        <div class="mb-8 text-center">
            <span class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full text-sm font-bold mb-3 inline-block">Self-Ladder Tool</span>
            <h1 class="text-3xl font-black text-slate-800 leading-tight mb-2">셀프 사다리</h1>
            <p id="lesson-title" class="text-blue-600 font-bold text-lg"></p>
        </div>
        
        <p class="text-slate-500 mb-4 font-medium text-sm text-center italic">"한 구간당 반복할 문장 수를 선택하세요."</p>
        <div class="grid grid-cols-2 gap-3 mb-8" id="chunk-options">
            <button onclick="setChunk(3, this)" class="chunk-btn py-3 rounded-xl border-2 border-slate-100 font-bold transition-all text-slate-600 text-sm">3문장씩</button>
            <button onclick="setChunk(4, this)" class="chunk-btn py-3 rounded-xl border-2 border-slate-100 font-bold transition-all text-slate-600 text-sm">4문장씩</button>
            <button onclick="setChunk(5, this)" class="chunk-btn py-3 rounded-xl border-2 chunk-active font-bold transition-all text-sm text-blue-600 border-blue-500 bg-blue-50">5문장씩</button>
            <button onclick="setChunk(6, this)" class="chunk-btn py-3 rounded-xl border-2 border-slate-100 font-bold transition-all text-slate-600 text-sm">6문장씩</button>
            <button onclick="setChunk(10, this)" class="chunk-btn py-3 rounded-xl border-2 border-slate-100 font-bold transition-all text-slate-600 text-sm col-span-2">10문장씩 크게 반복</button>
        </div>
        
        <button onclick="startStudy()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">연습 시작하기</button>
    </div>

    <!-- [2] 학습 화면 -->
    <div id="study-screen" class="hidden w-full max-w-lg">
        <div class="flex justify-between items-end mb-4 px-2">
            <div id="chunk-indicator" class="text-orange-600 font-black text-xl">구간 1</div>
            <div id="progress-text" class="text-slate-400 text-sm font-bold">Step 1 / 00</div>
        </div>

        <div class="bg-white p-10 rounded-[3rem] shadow-2xl min-h-[380px] flex flex-col justify-center items-center text-center mb-8 border border-slate-50 relative">
            <div id="kr-box" class="text-2xl font-bold text-slate-800 leading-relaxed mb-8 break-keep"></div>
            <div id="en-box" class="invisible opacity-0 translate-y-4 transition-all duration-500 w-full text-center">
                <div class="h-[1px] bg-slate-100 w-16 mx-auto mb-8"></div>
                <p id="en-text" class="text-2xl font-black text-blue-600 leading-tight break-keep px-4"></p>
            </div>
        </div>

        <button onclick="handleAction()" id="main-btn" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl active:scale-95 transition-all">정답 확인</button>
        
        <div class="mt-12 h-2.5 w-full bg-slate-200 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-orange-500 transition-all duration-500 shadow-[0_0_10px_rgba(249,115,22,0.3)]" style="width: 0%"></div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1CHjY3h5DyIshn18duKQotb6HtVdgsdKqiQA1mHi72y0/gviz/tq?tqx=out:csv&gid=0";

        let rawData = [];
        let studySequence = [];
        let currentIdx = 0;
        let isRevealed = false;
        let selectedChunkSize = 5;

        const params = new URLSearchParams(window.location.search);
        const currentLessonId = params.get('id');
        
        if(currentLessonId) {
            document.getElementById('lesson-title').innerText = currentLessonId.replace('_', ' ');
        } else {
            document.getElementById('lesson-title').innerText = "강의를 선택해주세요";
        }

        function setChunk(size, btn) {
            selectedChunkSize = size;
            document.querySelectorAll('.chunk-btn').forEach(b => {
                b.classList.remove('chunk-active', 'border-blue-500', 'bg-blue-50', 'text-blue-600');
                b.classList.add('border-slate-100', 'text-slate-600');
            });
            btn.classList.add('chunk-active');
            btn.classList.remove('border-slate-100', 'text-slate-600');
            btn.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-600');
        }

        async function startStudy() {
            if(!currentLessonId) {
                alert("URL 끝에 ?id=강의명 을 붙여서 접속해주세요.");
                return;
            }
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                
                const rows = text.split('\n').map(row => {
                    return row.split('","').map(cell => cell.replace(/"/g, '').trim());
                });

                rawData = rows.slice(1)
                    .filter(r => r[0] && r[0] === currentLessonId)
                    .map(r => ({ kr: r[2], en: r[3] }));

                if (rawData.length === 0) {
                    alert("데이터가 없습니다. 시트의 A열(Lesson)에 '" + currentLessonId + "'가 있는지 확인하세요.");
                    return;
                }

                studySequence = [];
                for (let i = 0; i < rawData.length; i += selectedChunkSize) {
                    let end = Math.min(i + selectedChunkSize - 1, rawData.length - 1);
                    for (let j = i; j <= end; j++) {
                        for (let k = i; k <= j; k++) {
                            studySequence.push({ 
                                data: rawData[k], 
                                chunkNum: Math.floor(i/selectedChunkSize) + 1 
                            });
                        }
                    }
                }

                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('study-screen').classList.remove('hidden');
                render();
            } catch (e) {
                alert("데이터를 가져오지 못했습니다.");
            }
        }

        function render() {
            const item = studySequence[currentIdx];
            document.getElementById('kr-box').innerText = item.data.kr;
            document.getElementById('en-text').innerText = item.data.en;
            document.getElementById('chunk-indicator').innerText = `구간 ${item.chunkNum}`;
            document.getElementById('progress-text').innerText = `Step ${currentIdx + 1} / ${studySequence.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx) / (studySequence.length - 1)) * 100}%`;
            
            document.getElementById('en-box').classList.add('invisible', 'opacity-0', 'translate-y-4');
            document.getElementById('main-btn').innerText = "정답 확인";
            isRevealed = false;
        }

        function handleAction() {
            if (!isRevealed) {
                document.getElementById('en-box').classList.remove('invisible', 'opacity-0', 'translate-y-4');
                document.getElementById('main-btn').innerText = "다음 단계";
                isRevealed = true;
            } else {
                currentIdx++;
                if (currentIdx < studySequence.length) {
                    render();
                } else {
                    alert("🎉 수고하셨습니다! 모든 연습을 마쳤습니다.");
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
